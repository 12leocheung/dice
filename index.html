<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICE-LATRO: UNLIMITED_EDITION</title>
<style>
:root {
  --ng: #39ff14;
  --ng2: #00ff88;
  --ng3: #b0ff50;
  --dg: #071a03;
  --bg: #030804;
  --card: #061203;
  --glow: 0 0 10px rgba(57,255,20,0.6);
  --glow2: 0 0 22px rgba(57,255,20,0.85);
  --glow3: 0 0 40px rgba(57,255,20,0.5);
  --red: #ff3a3a;
  --gold: #ffd700;
  --blue: #00b8ff;
  --purple: #bf5fff;
}

*, *::before, *::after { box-sizing: border-box; }

@font-face {
  font-family: 'Share Tech Mono';
  src: url('https://fonts.gstatic.com/s/sharetechmono/v15/J7aHnp1uDWRBEqV98dVQztYldFc7pAsEIc3Xew.woff2') format('woff2');
}

body {
  background: var(--bg);
  color: var(--ng);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100dvh; margin: 0;
  text-transform: uppercase;
  overflow-x: hidden; overflow-y: auto;
  text-shadow: var(--glow);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ── CRT OVERLAY ── */
#crt-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
}
#crt-overlay::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
  );
  animation: scanroll 8s linear infinite;
}
#crt-overlay::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
}
#crt-corners {
  position: absolute; inset: -3px; border-radius: var(--radius);
  pointer-events: none; z-index: 6;
  box-shadow: 0 0 0 6px var(--bg);
}
#crt-corners::before {
  content: ''; position: absolute; inset: 0; border-radius: calc(var(--radius) - 2px);
  background: radial-gradient(ellipse at 50% 50%, transparent 70%, rgba(0,0,0,0.6) 90%, rgba(0,0,0,0.95) 100%);
  pointer-events: none;
}
@keyframes scanroll { from{background-position:0 0} to{background-position:0 400px} }

/* phosphor flicker */
@keyframes phFlicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.88} 94%{opacity:1} 96%{opacity:0.94} 97%{opacity:1} }
body { animation: phFlicker 6s step-end infinite; }

/* ── SCREENSHAKE ── */
@keyframes shake-sm { 0%,100%{transform:translate(0)} 20%{transform:translate(-4px,2px)} 40%{transform:translate(4px,-3px)} 60%{transform:translate(-2px,4px)} 80%{transform:translate(3px,-1px)} }
@keyframes shake-lg { 0%,100%{transform:translate(0)} 15%{transform:translate(-10px,5px) rotate(-0.5deg)} 30%{transform:translate(10px,-6px) rotate(0.5deg)} 50%{transform:translate(-8px,8px)} 70%{transform:translate(7px,-4px)} 90%{transform:translate(-3px,3px)} }
@keyframes shake-xl { 0%,100%{transform:translate(0) rotate(0)} 10%{transform:translate(-14px,7px) rotate(-1deg)} 25%{transform:translate(14px,-8px) rotate(1deg) skewX(2deg)} 40%{transform:translate(-10px,10px)} 60%{transform:translate(12px,-6px) skewX(-1deg)} 80%{transform:translate(-5px,5px)} }
.shake-sm { animation: shake-sm 0.3s ease-out; }
.shake-lg { animation: shake-lg 0.45s ease-out; }
.shake-xl { animation: shake-xl 0.6s ease-out; }

/* ── GLITCH ── */
@keyframes glitch {
  0%,100%{transform:translate(0);filter:none}
  20%{transform:translate(-8px,4px) skewX(12deg);filter:hue-rotate(90deg) brightness(2)}
  40%{transform:translate(8px,-4px) skewX(-8deg);filter:hue-rotate(-90deg)}
  60%{transform:translate(-3px,6px);filter:brightness(1.5)}
  80%{transform:translate(4px,-2px)}
}
.glitching { animation: glitch 0.35s step-end infinite; }

/* ── GAME CONTAINER ── */
:root { --radius: 28px; --die-size: 80px; --pad: 20px; }

#gc {
  width: min(960px, 100vw);
  min-height: 100dvh;
  background: var(--bg);
  border: 3px solid var(--ng);
  border-radius: var(--radius);
  box-shadow: var(--glow2), inset 0 0 40px rgba(57,255,20,0.04), 0 0 80px rgba(57,255,20,0.08);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  margin: 0 auto;
}
#gc::before {
  content: ''; position: absolute; inset: 0;
  border-radius: calc(var(--radius) - 2px);
  box-shadow: inset 0 0 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(57,255,20,0.06);
  pointer-events: none; z-index: 5;
}

/* ── HEADER ── */
#hdr {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center;
  border-bottom: 2px solid var(--ng);
  padding: 10px var(--pad);
  background: linear-gradient(180deg, rgba(57,255,20,0.07) 0%, transparent 100%);
  gap: 8px;
}
.hdr-left { font-size: clamp(0.55rem, 1.5vw, 0.75rem); line-height: 1.8; }
.hdr-center { text-align: center; }
.title-main { font-size: clamp(0.9rem, 2.5vw, 1.3rem); letter-spacing: clamp(2px,0.5vw,4px); color: var(--ng3); text-shadow: var(--glow2); }
.title-sub { font-size: clamp(0.38rem, 1vw, 0.5rem); letter-spacing: clamp(4px,1vw,8px); opacity: 0.6; }
.money-box {
  border: 2px solid var(--ng); padding: clamp(4px,1vw,8px) clamp(8px,2vw,18px);
  background: var(--dg); text-align: right; margin-left: auto;
  box-shadow: var(--glow);
}
.money-box::before { content: '💾 CREDITS'; font-size: clamp(0.38rem,1vw,0.5rem); display: block; opacity: 0.6; }
#bank-ui { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 900; }

/* ante bar */
#ante-bar {
  background: rgba(57,255,20,0.05); border-bottom: 1px solid rgba(57,255,20,0.3);
  display: flex; gap: 4px; align-items: center; padding: 5px var(--pad);
  font-size: clamp(0.45rem, 1.2vw, 0.6rem); flex-wrap: wrap;
}
.ante-pip { width: 12px; height: 12px; border: 1px solid var(--ng); background: transparent; transition: background 0.3s; flex-shrink: 0; }
.ante-pip.done { background: var(--ng); }
#score-bar-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#score-bar-outer { width: clamp(100px, 20vw, 180px); height: 8px; border: 1px solid var(--ng); background: #000; }
#score-bar-inner { height: 100%; background: var(--ng); width: 0%; transition: width 0.5s ease; box-shadow: var(--glow); }

/* ── MAIN PLAY AREA ── */
#screen-play { padding: 8px var(--pad); display: flex; flex-direction: column; gap: 6px; }

/* score display */
#score-chips { display: flex; gap: 4px; align-items: center; justify-content: center; flex-wrap: wrap; }
.chip {
  padding: 3px 8px; font-size: clamp(0.55rem, 1.5vw, 0.75rem); font-weight: bold;
  border: 1px solid; animation: chipIn 0.2s ease-out;
}
.chip-blue  { border-color: var(--blue); color: var(--blue); background: rgba(0,184,255,0.1); }
.chip-red   { border-color: var(--red); color: var(--red); background: rgba(255,58,58,0.1); }
.chip-gold  { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }
.chip-green { border-color: var(--ng); color: var(--ng); background: rgba(57,255,20,0.1); }
@keyframes chipIn { from{transform:scale(0.6) translateY(6px);opacity:0} to{transform:scale(1);opacity:1} }

#hand-name {
  text-align: center; font-size: clamp(1rem, 3.5vw, 1.6rem); font-weight: 900; min-height: 2em;
  letter-spacing: clamp(1px,0.5vw,3px); color: var(--ng3); text-shadow: var(--glow2); transition: all 0.2s;
}
#hand-name.legendary { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4); animation: legendPulse 0.8s ease-out; }
#hand-name.epic { color: var(--purple); text-shadow: 0 0 20px rgba(191,95,255,0.8); animation: legendPulse 0.8s ease-out; }
@keyframes legendPulse { 0%{transform:scale(1.3);opacity:0.5} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }

#score-total {
  text-align: center; font-size: clamp(2rem, 7vw, 3rem); font-weight: 900;
  line-height: 1; text-shadow: var(--glow2);
}

/* ── DICE ── */
#dice-box {
  display: flex; gap: clamp(6px,1.5vw,12px); justify-content: center;
  flex-wrap: wrap; min-height: calc(var(--die-size) + 20px); align-items: center;
  padding: 6px 0;
}
.die {
  width: var(--die-size); height: var(--die-size);
  border: 3px solid var(--ng);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  cursor: pointer; position: relative; overflow: hidden;
  background: rgba(0,0,0,0.9);
  box-shadow: var(--glow);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.die:hover:not(.blank):not(.rolling) { transform: translateY(-4px) scale(1.05); box-shadow: var(--glow2); }
.die:active:not(.blank) { transform: translateY(-2px) scale(0.97); }
.die .die-val { font-size: calc(var(--die-size) * 0.38); font-weight: 900; line-height: 1; }
.die .die-label { font-size: calc(var(--die-size) * 0.1); letter-spacing: 1px; margin-top: 1px; opacity: 0.8; font-weight: bold; }
.die.blank { border: 2px dashed rgba(57,255,20,0.2); opacity: 0.25; box-shadow: none; cursor: default; }
.die.held {
  background: var(--ng); color: #000;
  transform: translateY(-10px);
  box-shadow: var(--glow2), 0 10px 25px rgba(0,0,0,0.5);
  text-shadow: none;
}
.die.held .die-label { color: rgba(0,0,0,0.5); }
.die.held::after { content: 'HELD'; position: absolute; top: 2px; right: 3px; font-size: calc(var(--die-size)*0.09); color: rgba(0,0,0,0.6); }
.die.rolling { animation: dieRoll 0.4s ease-out; border-color: var(--ng3); }
@keyframes dieRoll {
  0%{transform:rotate(-15deg) scale(0.8);opacity:0.3}
  40%{transform:rotate(8deg) scale(1.1);opacity:1}
  70%{transform:rotate(-4deg) scale(0.97)}
  100%{transform:rotate(0) scale(1)}
}

/* ── MATERIAL STYLES ── */
.mat-gold    { border-color:#ffd700!important; background:linear-gradient(135deg,#1a1200,#2a1f00)!important; box-shadow:0 0 16px rgba(255,215,0,0.5),inset 0 0 12px rgba(255,215,0,0.08)!important; }
.mat-gold    .die-val { color:#ffd700; text-shadow:0 0 10px rgba(255,215,0,0.8); }
.mat-gold    .die-label { color:#ffd700; }
.mat-fire    { border-color:#ff4500!important; background:linear-gradient(135deg,#1a0500,#2a0800)!important; box-shadow:0 0 16px rgba(255,69,0,0.6),inset 0 0 12px rgba(255,100,0,0.1)!important; animation:fireFlicker 1.5s ease-in-out infinite alternate; }
.mat-fire    .die-val { color:#ff6a00; text-shadow:0 0 12px rgba(255,100,0,0.9); }
.mat-fire    .die-label { color:#ff4500; }
@keyframes fireFlicker { 0%{box-shadow:0 0 14px rgba(255,69,0,0.5),inset 0 0 8px rgba(255,100,0,0.1)} 100%{box-shadow:0 0 24px rgba(255,120,0,0.8),inset 0 0 16px rgba(255,150,0,0.15)} }
.mat-cursed  { border-color:#bf5fff!important; background:linear-gradient(135deg,#0d0015,#140020)!important; box-shadow:0 0 16px rgba(191,95,255,0.5),inset 0 0 12px rgba(191,95,255,0.08)!important; }
.mat-cursed  .die-val { color:#d080ff; text-shadow:0 0 10px rgba(191,95,255,0.8); }
.mat-cursed  .die-label { color:#bf5fff; }
.mat-glass   { border-color:#a8e6ff!important; background:linear-gradient(135deg,rgba(168,230,255,0.05),rgba(200,240,255,0.12))!important; box-shadow:0 0 18px rgba(168,230,255,0.4),inset 0 0 20px rgba(255,255,255,0.05)!important; }
.mat-glass   .die-val { color:#c8f0ff; text-shadow:0 0 12px rgba(168,230,255,0.9); }
.mat-glass   .die-label { color:#a8e6ff; }
.mat-glass.shattered { opacity:0.2; border-style:dashed!important; filter:grayscale(1); pointer-events:none; }
.mat-steel   { border-color:#8899aa!important; background:linear-gradient(135deg,#0d1015,#151b20)!important; box-shadow:0 0 10px rgba(136,153,170,0.3),inset 1px 1px 0 rgba(200,220,240,0.1)!important; }
.mat-steel   .die-val { color:#aabbcc; text-shadow:0 0 6px rgba(136,153,170,0.6); }
.mat-steel   .die-label { color:#8899aa; }
.mat-steel.held { background:linear-gradient(135deg,#1a2530,#253545)!important; border-color:#aabbcc!important; }
.mat-bronze  { border-color:#cd7f32!important; background:linear-gradient(135deg,#140a00,#1f1000)!important; box-shadow:0 0 12px rgba(205,127,50,0.4),inset 0 0 10px rgba(205,127,50,0.06)!important; }
.mat-bronze  .die-val { color:#e09040; text-shadow:0 0 8px rgba(205,127,50,0.7); }
.mat-bronze  .die-label { color:#cd7f32; }
.mat-crystal { border-color:#ff80ff!important; background:linear-gradient(135deg,#100010,#001010)!important; box-shadow:0 0 20px rgba(255,128,255,0.4),0 0 8px rgba(0,255,200,0.3),inset 0 0 14px rgba(255,255,255,0.04)!important; animation:crystalShift 3s linear infinite; }
.mat-crystal .die-val { color:#ff99ff; text-shadow:0 0 10px rgba(255,128,255,0.8); }
.mat-crystal .die-label { color:#ff80ff; }
@keyframes crystalShift { 0%{border-color:#ff80ff} 33%{border-color:#80ffff} 66%{border-color:#ffff80} 100%{border-color:#ff80ff} }
.mat-obsidian{ border-color:#444!important; background:linear-gradient(135deg,#050505,#0a0808)!important; box-shadow:0 0 8px rgba(255,50,0,0.3),inset 0 0 20px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,80,0,0.2)!important; }
.mat-obsidian .die-val { color:#ff6633; text-shadow:0 0 8px rgba(255,80,0,0.7); }
.mat-obsidian .die-label { color:#662211; }
.mat-wooden  { border-color:#8b5e3c!important; background:linear-gradient(135deg,#120800,#1a0f05)!important; box-shadow:0 0 8px rgba(139,94,60,0.4),inset 0 0 8px rgba(139,94,60,0.08)!important; }
.mat-wooden  .die-val { color:#c8854a; text-shadow:0 0 6px rgba(139,94,60,0.5); }
.mat-wooden  .die-label { color:#8b5e3c; }

/* ── SCORE POPUP ── */
.score-pop {
  position: absolute; font-size: clamp(1rem,3vw,1.4rem); font-weight: 900;
  pointer-events: none; z-index: 100;
  animation: popUp 1s ease-out forwards; text-shadow: var(--glow2);
}
@keyframes popUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(1.4);opacity:0} }

/* ── CONSUMABLE ZONE ── */
#consumable-zone {
  border: 1px solid rgba(57,255,20,0.4); padding: 6px 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: rgba(57,255,20,0.03); font-size: clamp(0.5rem,1.4vw,0.65rem);
  min-height: 40px;
}
.cons-label { opacity: 0.5; white-space: nowrap; }
#cons-slot { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
.cons-card {
  border: 1px solid var(--ng3); padding: clamp(3px,0.8vw,4px) clamp(8px,2vw,10px);
  background: rgba(0,255,136,0.08); color: var(--ng3);
  font-size: clamp(0.5rem,1.4vw,0.65rem); font-weight: bold;
  cursor: pointer; transition: all 0.15s;
  touch-action: manipulation;
}
.cons-card:hover, .cons-card:active { background: rgba(0,255,136,0.2); }

/* ── CONTROLS ── */
.controls {
  display: flex; justify-content: center; gap: clamp(8px,2vw,20px); align-items: center;
  padding: 4px 0; flex-wrap: wrap;
}
.ctrl-stat { font-size: clamp(0.6rem,1.5vw,0.75rem); text-align: center; line-height: 1.5; }
.ctrl-stat span { display: block; font-size: clamp(1rem,2.5vw,1.2rem); font-weight: 900; }

button {
  background: transparent; color: var(--ng);
  border: 2px solid var(--ng);
  padding: clamp(8px,2vw,10px) clamp(14px,3vw,24px);
  cursor: pointer; font-weight: bold; font-family: inherit;
  font-size: clamp(0.65rem,1.8vw,0.8rem); letter-spacing: clamp(1px,0.4vw,2px);
  position: relative; overflow: hidden;
  transition: all 0.15s; text-transform: uppercase;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  min-height: 44px; /* iOS touch target */
}
button::before {
  content: ''; position: absolute; inset: 0;
  background: var(--ng); transform: translateX(-101%);
  transition: transform 0.15s ease-out;
}
button:hover:not(:disabled)::before { transform: translateX(0); }
button:hover:not(:disabled), button:active:not(:disabled) { color: #000; text-shadow: none; }
button:active:not(:disabled)::before { transform: translateX(0); }
button:disabled { opacity: 0.25; cursor: default; border-style: dashed; }
button span { position: relative; z-index: 1; }
button.btn-red { border-color: var(--red); color: var(--red); }
button.btn-red::before { background: var(--red); }
button.btn-gold { border-color: var(--gold); color: var(--gold); }
button.btn-gold::before { background: var(--gold); }
button.btn-big { padding: clamp(10px,2.5vw,14px) clamp(20px,4vw,36px); font-size: clamp(0.75rem,2vw,1rem); border-width: 3px; }

/* ── JOKER TRAY ── */
#passive-bin {
  border-top: 1px solid rgba(57,255,20,0.3);
  padding: 6px var(--pad) 8px;
  background: rgba(57,255,20,0.02);
}
.tray-label { font-size: clamp(0.4rem,1.1vw,0.5rem); opacity: 0.5; margin-bottom: 4px; letter-spacing: 3px; }
#joker-list { display: flex; gap: clamp(4px,1vw,8px); flex-wrap: wrap; min-height: 54px; align-items: flex-start; padding-top: 2px; }
.joker-card {
  border: 1px solid; padding: clamp(3px,0.8vw,5px) clamp(6px,1.5vw,9px);
  font-size: clamp(0.42rem,1.1vw,0.52rem); line-height: 1.4;
  cursor: help; transition: transform 0.1s;
  min-width: clamp(70px,15vw,90px); max-width: clamp(100px,22vw,120px);
}
.joker-card:hover { transform: translateY(-4px); z-index: 10; }
.joker-card .jname { font-size: clamp(0.5rem,1.4vw,0.65rem); font-weight: bold; display: block; }
.joker-rarity-common   { border-color:var(--ng);    color:var(--ng);    background:rgba(57,255,20,0.06); }
.joker-rarity-uncommon { border-color:var(--blue);  color:var(--blue);  background:rgba(0,184,255,0.06); }
.joker-rarity-rare     { border-color:var(--gold);  color:var(--gold);  background:rgba(255,215,0,0.06); }
.joker-rarity-legendary{ border-color:var(--purple);color:var(--purple);background:rgba(191,95,255,0.06); }

/* ── SHOP SCREEN ── */
#screen-shop {
  position: absolute; inset: 0;
  background: var(--bg); z-index: 50;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.shop-hdr {
  border-bottom: 2px solid var(--ng);
  padding: 10px var(--pad);
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(180deg, rgba(57,255,20,0.08) 0%, transparent 100%);
  flex-shrink: 0;
}
.shop-hdr h2 { font-size: clamp(1rem,3vw,1.6rem); letter-spacing: clamp(2px,0.6vw,4px); margin: 0; }
#shop-tabs {
  display: flex; border-bottom: 1px solid rgba(57,255,20,0.3);
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
#shop-tabs::-webkit-scrollbar { display: none; }
.shop-tab {
  padding: clamp(6px,1.5vw,8px) clamp(10px,2.5vw,20px);
  font-size: clamp(0.5rem,1.4vw,0.65rem); letter-spacing: clamp(1px,0.3vw,2px);
  border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
  transition: all 0.15s; color: rgba(57,255,20,0.5); flex-shrink: 0;
  touch-action: manipulation;
}
.shop-tab.active { color: var(--ng); border-bottom-color: var(--ng); background: rgba(57,255,20,0.05); }
.shop-tab:hover:not(.active), .shop-tab:active { color: var(--ng3); }
#shop-content { flex: 1; overflow-y: auto; padding: 12px var(--pad); -webkit-overflow-scrolling: touch; }
.shop-section-title { font-size: clamp(0.45rem,1.2vw,0.6rem); opacity:0.5; letter-spacing:3px; margin-bottom:8px; border-bottom:1px solid rgba(57,255,20,0.2); padding-bottom:4px; }
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(160px,40vw), 1fr)); gap: clamp(8px,1.5vw,12px); margin-bottom: 16px; }

.shop-card {
  border: 2px solid; padding: clamp(8px,2vw,12px);
  background: var(--card); cursor: pointer;
  transition: all 0.15s; position: relative;
  display: flex; flex-direction: column; gap: 3px;
  touch-action: manipulation;
}
.shop-card:hover:not(.sold):not(.cant-afford), .shop-card:active:not(.sold):not(.cant-afford) { transform: translateY(-3px); }
.shop-card.sold { opacity: 0.25; pointer-events: none; }
.shop-card.cant-afford { opacity: 0.4; cursor: not-allowed; }
.shop-card .stype { font-size: clamp(0.36rem,1vw,0.42rem); padding: 2px 6px; display: inline-block; margin-bottom: 3px; font-weight: bold; letter-spacing: 1px; align-self: flex-start; }
.shop-card .sname { font-size: clamp(0.7rem,2vw,0.9rem); font-weight: bold; line-height: 1.2; }
.shop-card .sdesc { font-size: clamp(0.42rem,1.1vw,0.52rem); opacity: 0.7; line-height: 1.5; flex: 1; }
.shop-card .sprice { font-size: clamp(0.85rem,2.5vw,1.1rem); font-weight: 900; margin-top: 4px; }
.shop-card .seffect { font-size: clamp(0.38rem,1vw,0.5rem); opacity: 0.5; margin-top: 2px; }

/* rarity */
.sc-common   { border-color:rgba(57,255,20,0.6); }
.sc-uncommon { border-color:rgba(0,184,255,0.6); }
.sc-rare     { border-color:rgba(255,215,0,0.7); box-shadow:0 0 10px rgba(255,215,0,0.15); }
.sc-legendary{ border-color:rgba(191,95,255,0.7); box-shadow:0 0 14px rgba(191,95,255,0.2); }
.sc-common  .stype { background:rgba(57,255,20,0.15);  color:var(--ng); }
.sc-uncommon.stype { background:rgba(0,184,255,0.15);  color:var(--blue); }
.sc-rare    .stype { background:rgba(255,215,0,0.15);  color:var(--gold); }
.sc-legendary .stype{ background:rgba(191,95,255,0.15);color:var(--purple); }
.sc-common   .sprice { color:var(--ng); }
.sc-uncommon .sprice { color:var(--blue); }
.sc-rare     .sprice { color:var(--gold); }
.sc-legendary .sprice{ color:var(--purple); }

.shop-footer {
  border-top: 1px solid rgba(57,255,20,0.3); padding: 10px var(--pad);
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px; flex-wrap: wrap; flex-shrink: 0;
}
.shop-reroll-cost { font-size: clamp(0.5rem,1.3vw,0.6rem); }

/* ── GAME OVER / WIN ── */
#screen-over, #screen-win {
  position: absolute; inset: 0; z-index: 80;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 16px; text-align: center;
  padding: var(--pad);
}
#screen-over { background: rgba(3,8,4,0.97); }
#screen-win  { background: rgba(3,8,4,0.97); }
.go-title { font-size: clamp(2.5rem,10vw,5rem); font-weight:900; color:var(--red); text-shadow:0 0 30px rgba(255,58,58,0.7); letter-spacing:6px; animation:glitch 0.4s step-end infinite; }
.go-stats { font-size: clamp(0.6rem,1.8vw,0.75rem); line-height:2.5; opacity:0.7; }
.win-title { font-size: clamp(2rem,8vw,4rem); font-weight:900; color:var(--gold); text-shadow:0 0 30px rgba(255,215,0,0.7); letter-spacing:4px; }

/* ── NOTIFICATIONS ── */
#notif {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 200; pointer-events: none; display: flex; flex-direction: column; gap: 6px; align-items: center;
  width: 90%; max-width: 400px;
}
.notif-msg {
  padding: clamp(5px,1.5vw,7px) clamp(12px,3vw,18px);
  font-size: clamp(0.55rem,1.5vw,0.7rem); font-weight: bold;
  border: 1px solid; letter-spacing: 2px; white-space: nowrap;
  animation: notifAnim 2.5s ease-out forwards;
}
.notif-good { border-color:var(--ng);   color:var(--ng);   background:rgba(57,255,20,0.12); }
.notif-bad  { border-color:var(--red);  color:var(--red);  background:rgba(255,58,58,0.12); }
.notif-info { border-color:var(--blue); color:var(--blue); background:rgba(0,184,255,0.12); }
.notif-gold { border-color:var(--gold); color:var(--gold); background:rgba(255,215,0,0.12); }
@keyframes notifAnim { 0%{opacity:0;transform:translateY(-10px)} 15%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0;transform:translateY(-20px)} }

/* ── MISC ── */
.hidden { display: none !important; }
.sep { border: none; border-top: 1px solid rgba(57,255,20,0.2); margin: 4px 0; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--ng); }

<body>

<div id="crt-overlay"></div>
<div id="notif"></div>

<div id="gc">
  <div id="crt-corners"></div>

  <!-- HEADER -->
  <div id="hdr">
    <div class="hdr-left">
      CYCLE_<span id="round-ui">1</span> &nbsp;|&nbsp; ANTE_<span id="ante-ui">1</span><br>
      QUOTA: <strong id="target-ui">–</strong>
    </div>
    <div class="hdr-center">
      <div class="title-main">DICE-LATRO</div>
      <div class="title-sub">UNLIMITED_EDITION v2.0</div>
    </div>
    <div class="money-box" style="text-align:right">
      $<span id="bank-ui" class="money-value">0</span>
    </div>
  </div>

  <!-- ANTE PIPS + SCORE BAR -->
  <div id="ante-bar">
    <span style="font-size:0.55rem;opacity:0.5;margin-right:6px">ANTE</span>
    <div id="ante-pips" style="display:flex;gap:4px"></div>
    <div id="score-bar-wrap">
      <span style="font-size:0.55rem;opacity:0.6" id="score-progress-txt">0 / 0</span>
      <div id="score-bar-outer"><div id="score-bar-inner"></div></div>
    </div>
  </div>

  <!-- PLAY SCREEN -->
  <div id="screen-play">

    <!-- Hand name -->
    <div id="hand-name">–</div>

    <!-- Score formula chips -->
    <div id="score-chips"></div>

    <!-- Total score -->
    <div id="score-total">0</div>

    <!-- Dice -->
    <div id="dice-box"></div>

    <!-- Consumable zone -->
    <div id="consumable-zone">
      <span class="cons-label">CONS_SLOT:</span>
      <div id="cons-slot">
        <span id="cons-empty" style="opacity:0.35;font-size:0.6rem">[ EMPTY ]</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-stat">REROLLS<span id="rerolls-ui">3</span></div>
      <button id="roll-btn" onclick="runRoll()"><span>↻ REROLL</span></button>
      <button id="cash-btn" onclick="enterShop()" class="btn-gold" disabled><span>⬆ UPLINK</span></button>
    </div>

    <hr class="sep">
  </div>

  <!-- JOKER TRAY -->
  <div id="passive-bin">
    <div class="tray-label">HARDWARE_INVENTORY &nbsp;|&nbsp; JOKERS: <span id="joker-count">0</span>/5</div>
    <div id="joker-list"></div>
  </div>

  <!-- SHOP SCREEN -->
  <div id="screen-shop" class="hidden">
    <div class="shop-hdr">
      <h2>⬡ MARKET_UPLINK</h2>
      <div class="money-box">$<span id="shop-bank-ui" class="money-value">0</span></div>
    </div>
    <div id="shop-tabs">
      <div class="shop-tab active" data-tab="jokers" onclick="switchTab('jokers')">JOKERS</div>
      <div class="shop-tab" data-tab="consumables" onclick="switchTab('consumables')">CONSUMABLES</div>
      <div class="shop-tab" data-tab="upgrades" onclick="switchTab('upgrades')">UPGRADES</div>
      <div class="shop-tab" data-tab="dice" onclick="switchTab('dice')">DICE_MODS</div>
    </div>
    <div id="shop-content"></div>
    <div class="shop-footer">
      <div class="shop-reroll-cost">REROLL SHOP: $<span id="reroll-cost-ui">5</span></div>
      <button onclick="rerollShop()" class="btn-red"><span>↻ REROLL_SHOP</span></button>
      <button onclick="startNextRound()" class="btn-big"><span>▶▶ NEXT_CYCLE</span></button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-over" class="hidden">
    <div class="go-title">CORE_DUMPED</div>
    <div class="go-stats" id="go-stats"></div>
    <button onclick="location.reload()" class="btn-red btn-big"><span>↺ RELOAD_SYS</span></button>
  </div>

  <!-- WIN -->
  <div id="screen-win" class="hidden">
    <div class="win-title">⬡ SYSTEM_CLEARED ⬡</div>
    <div class="go-stats" id="win-stats"></div>
    <button onclick="location.reload()" class="btn-gold btn-big"><span>↺ NEW_GAME</span></button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════
let g = {
  ante: 1, round: 1, rerolls: 3, maxRerolls: 3,
  bank: 4, target: 300, runScore: 0,
  baseMult: 1.0, baseChips: 0,
  dice: [],
  jokers: [], consumables: [],
  firstRollDone: false, glassRerolled: false,
  roundScore: 0, shopRerollCost: 5,
  handsPlayed: 0, totalScore: 0,
  handLevels: { 'PAIR':1, 'TWO_PAIR':1, 'THREE_OF_A_KIND':1, 'STRAIGHT':1, 'FULL_HOUSE':1, 'FOUR_OF_A_KIND':1, 'FIVE_OF_A_KIND':1, 'SIX_OF_A_KIND':1, 'SEVEN_OF_A_KIND':1, 'EIGHT_OF_A_KIND':1, 'NINE_OF_A_KIND':1, 'TEN_OF_A_KIND':1, 'HIGH_CARD':1 }
};

// ANTE structure: [target, reward]
const ANTE_TABLE = [
  [30, 3], [60, 4], [100, 5], [160, 5], [250, 6], [400, 7], [650, 8]
];
const MAX_ANTE = ANTE_TABLE.length;

// HAND DEFINITIONS — N_OF_A_KIND is generated dynamically for N>=5
const HANDS = {
  HIGH_CARD:       { c:2,  m:1,   n:'HIGH CARD',        label:'single high' },
  PAIR:            { c:4,  m:1.5, n:'PAIR',              label:'two matching' },
  TWO_PAIR:        { c:8,  m:2,   n:'TWO PAIR',          label:'two pairs' },

  TEN_OF_A_KIND:   { c:200,m:45,  n:'TEN OF A KIND',     label:'legendary' },
};

// For N > 10, generate dynamically
function getNOfAKindKey(n) {
  const keys = ['','','PAIR','THREE_OF_A_KIND','FOUR_OF_A_KIND','FIVE_OF_A_KIND','SIX_OF_A_KIND','SEVEN_OF_A_KIND','EIGHT_OF_A_KIND','NINE_OF_A_KIND','TEN_OF_A_KIND'];
  if(n < 2) return 'HIGH_CARD';
  if(n <= 10) return keys[n];
  // Beyond 10: synthetic
  return `${n}_OF_A_KIND`;
}

function getHandDef(key) {
  if(HANDS[key]) return HANDS[key];
  // Dynamic N-of-a-kind beyond 10
  const n = parseInt(key);
  if(!isNaN(n)) {
    return { c: 200 + (n-10)*60, m: 45 + (n-10)*15, n: `${n} OF A KIND`, label:`${n} matching` };
  }
  return HANDS.HIGH_CARD;
}

function initBoard() {
  const box = document.getElementById('dice-box');
  box.innerHTML = '';
  g.dice.forEach((d, i) => {
    const div = document.createElement('div');
    const mat = d.material || 'stone';
    const matDef = MATERIALS[mat] || MATERIALS.stone;
    const isBlank = d.v === null;
    const isShattered = d.shattered;
    div.className = [
      'die',
      isBlank ? 'blank' : '',
      d.held ? 'held' : '',
      `mat-${mat}`,
      isShattered ? 'shattered' : '',
    ].filter(Boolean).join(' ');

    // Tooltip
    div.title = `${matDef.name}: ${matDef.desc}`;

    const sideRange = d.sides[0] + '–' + d.sides[d.sides.length - 1];
    div.innerHTML = `
      <span class="die-val">${isBlank ? '' : d.v}</span>
      <span class="die-label">${matDef.label} · ${sideRange}</span>
    `;

    div.onclick = () => {
      if(isShattered) return;
      if(g.firstRollDone && d.v !== null) {
        d.held = !d.held;
        initBoard();
        calculateScore();
      }
    };
    box.appendChild(div);
  });
  calculateScore();
  updateCons();
}

function runRoll(free=false) {
  if (g.rerolls <= 0 && g.firstRollDone && !free) return;
  if (!g.firstRollDone) {
    g.firstRollDone = true;
    document.getElementById('cash-btn').disabled = false;
  } else if (!free) {
    g.rerolls--;
    g.glassRerolled = true;
  }

  const box = document.getElementById('dice-box');
  const divs = box.querySelectorAll('.die');

  g.dice.forEach((d, i) => {
    if (!d.held) {
      // Glass die shatters on reroll (after first roll)
      if (d.material === 'glass' && g.firstRollDone && !free && !g.glassShatterProof) {
        d.shattered = true;
        d.v = null;
        notify('GLASS DIE SHATTERED!', 'bad');
        return;
      }
      d.v = d.sides[Math.floor(Math.random()*d.sides.length)];
      divs[i]?.classList.add('rolling');
      setTimeout(() => divs[i]?.classList.remove('rolling'), 450);
    }
  });

  // JOKER triggers on roll
  triggerJokerEvent('onRoll');

  shake('sm');
  document.getElementById('rerolls-ui').innerText = g.rerolls;
  if(g.rerolls <= 0) document.getElementById('roll-btn').disabled = true;
  setTimeout(() => { initBoard(); }, 80);
}



function gameOver() {

  document.getElementById('screen-over').classList.remove('hidden');

// ══════════════════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════════════════
function getHandInfo() {
  const bronzeDice = g.dice.filter(d => d.material === 'bronze' && d.v !== null && !d.shattered);
  const normalDice = g.dice.filter(d => d.material !== 'bronze' && d.v !== null && !d.shattered);
  const vals = normalDice.map(d=>d.v).sort((a,b)=>a-b);
  const wildCount = bronzeDice.length;

  if(!vals.length && !wildCount) return { key:'HIGH_CARD', handName:'–', chips:0, mult:0, vals:[] };

  let counts={};
  vals.forEach(v => counts[v]=(counts[v]||0)+1);
  const cArr = Object.values(counts).sort((a,b)=>b-a);
  // Best group gets all wilds
  const topCount = (cArr[0] || 0) + wildCount;
  const secondCount = cArr[1] || 0;
  const uniq = [...new Set(vals)];
  const totalDice = vals.length + wildCount;
  const isStraight = uniq.length >= 4 && uniq.every((v,i) => i===0 || v===uniq[i-1]+1);

  let key;

  // N-of-a-kind: any count >= 2 of the same value (with wilds on top)
  if(topCount >= 2) {
    // Check if it qualifies as a straight first (straights beat lower N-of-a-kind)
    if(isStraight && totalDice >= 4 && topCount < 4) {
      key = 'STRAIGHT';
    } else if(topCount >= 4 && secondCount >= 2 && topCount < totalDice) {
      // Full house variant — only when not all same
      key = topCount >= 3 && secondCount >= 2 ? 'FULL_HOUSE' : getNOfAKindKey(topCount);
      // Full house only if top group isn't already N-of-a-kind for all dice
      if(topCount + secondCount < totalDice) key = getNOfAKindKey(topCount);
      else if(topCount >= 3 && secondCount >= 2) key = topCount >= 4 ? getNOfAKindKey(topCount) : 'FULL_HOUSE';
    } else if(topCount === 3 && secondCount === 2) {
      key = 'FULL_HOUSE';
    } else if(topCount >= 2 && secondCount >= 2 && topCount < 3) {
      key = 'TWO_PAIR';
    } else {
      key = getNOfAKindKey(topCount);
    }
  } else if(isStraight && totalDice >= 4) {
    key = 'STRAIGHT';
  } else {
    key = 'HIGH_CARD';
  }

  const def = getHandDef(key);
  const lv = g.handLevels[key] || 1;
  const allVals = [...vals, ...bronzeDice.map(d=>d.v)];
  return {
    key, vals: allVals,
    handName: def.n + (lv > 1 ? ` LV${lv}` : '') + (wildCount > 0 ? ` [${wildCount}✦]` : ''),
    chips: def.c + (lv-1)*10,
    mult:  def.m + (lv-1)*0.5,
  };
}

function calculateScore(commit=false) {
  if(!g.firstRollDone) {
    document.getElementById('hand-name').innerText = '–';
    document.getElementById('score-total').innerText = 0;
    document.getElementById('score-chips').innerHTML = '';
    return 0;
  }
  const { key, vals, handName, chips: baseChips, mult: baseMult } = getHandInfo();
  const sumVals = vals.reduce((a,b)=>a+b, 0);

  // Start calculating with joker bonuses
  let chips = baseChips + sumVals + g.baseChips;
  let mult  = baseMult + g.baseMult - 1.0; // g.baseMult starts at 1.0

  // Joker calculations
  let jokerDesc = [];
  g.jokers.forEach(j => {
    const res = applyJoker(j, key, vals, chips, mult);
    chips = res.chips;
    mult  = res.mult;
    if(res.desc) jokerDesc.push(res.desc);
  });

  // ── MATERIAL EFFECTS ──
  let matDescs = [];
  let glassDice = g.dice.filter(d => d.material === 'glass' && !d.shattered);
  let glassUnrerolled = glassDice.length > 0 && !g.glassRerolled;
  let steelHeld = g.dice.filter(d => d.material === 'steel' && d.held && d.v !== null).length;

  g.dice.forEach(d => {
    if(d.v === null || d.shattered) return;
    switch(d.material) {
      case 'gold':
        chips += 3;
        break;
      case 'fire':
        if(d.v === d.sides[d.sides.length - 1]) { mult += 1.5; matDescs.push(`🔥+1.5M`); }
        break;
      case 'cursed':
        if(d.v === 1) { chips += 8; matDescs.push(`💀+8C`); }
        break;
      case 'crystal':
        chips += d.v; // value counts twice (already counted once in sumVals)
        break;
      case 'obsidian':
        mult += g.dice.length * 0.3;
        break;
      case 'wooden':
        chips += d.woodenBonus || 0;
        break;
    }
  });

  // Steel: +1.5 mult per held steel die
  if(steelHeld > 0) { mult += steelHeld * 1.5; matDescs.push(`🔩+${(steelHeld*1.5).toFixed(1)}M`); }

  // Glass: x2 total score if not rerolled
  let glassMultiplier = 1;
  if(glassDice.length > 0 && !g.glassRerolled) { glassMultiplier = 2; matDescs.push(`🔷x2 GLASS`); }

  // Bronze: handled at hand detection level (wilds), just flag for display
  let bronzeCount = g.dice.filter(d => d.material === 'bronze' && d.v !== null && !d.shattered).length;
  if(bronzeCount > 0) matDescs.push(`🟤x${bronzeCount} WILD`);

  chips = Math.max(0, Math.floor(chips));
  mult  = Math.max(1, mult);
  const total = Math.floor(chips * mult * glassMultiplier);

  document.getElementById('hand-name').innerText = handName;
  // Visual flair for big hands
  const handEl = document.getElementById('hand-name');
  handEl.className = '';
  const nokKeys = ['SIX_OF_A_KIND','SEVEN_OF_A_KIND','EIGHT_OF_A_KIND','NINE_OF_A_KIND','TEN_OF_A_KIND'];
  const n = parseInt(key);
  if(nokKeys.includes(key) || (!isNaN(n) && n >= 6)) handEl.classList.add('legendary');
  else if(key === 'FIVE_OF_A_KIND') handEl.classList.add('epic');
  document.getElementById('score-total').innerText = total;

  // Chips display
  const chipsEl = document.getElementById('score-chips');
  chipsEl.innerHTML = '';
  const addChip = (txt, cls) => {
    const c = document.createElement('span');
    c.className = `chip ${cls}`;
    c.innerText = txt;
    chipsEl.appendChild(c);
  };
  addChip(`CHIPS: ${chips}`, 'chip-blue');
  addChip(`✕`, 'chip-green');
  addChip(`MULT: ${mult.toFixed(1)}`, 'chip-red');
  if(glassMultiplier > 1) addChip(`✕2 GLASS`, 'chip-blue');
  addChip(`= ${total}`, 'chip-gold');
  if(jokerDesc.length) addChip(jokerDesc.join(' | '), 'chip-green');
  if(matDescs.length) addChip(matDescs.join(' '), 'chip-green');

  updateScoreBar(total);
  return total;
}

function applyJoker(j, handKey, vals, chips, mult) {
  let desc = '';
  switch(j.id) {
    case 'SNIPER':     if(vals.includes(6)){ mult += 1.5; desc='+1.5M on 6'; } break;
    case 'GAMBLER':    if(vals.includes(1)){ chips += 8; desc='+8C on 1'; } break;
    case 'DOUBLER':    if(['PAIR','TWO_PAIR'].includes(handKey)){ mult += 2; desc='+2M pairs'; } break;
    case 'TRIPWIRE':   if(handKey==='THREE_OF_A_KIND'||handKey==='FULL_HOUSE'){ mult += 2.5; desc='+2.5M trips'; } break;
    case 'STRAIGHTER': if(handKey==='STRAIGHT'||handKey==='STRAIGHT_FLUSH'){ chips += 12; desc='+12C straight'; } break;
    case 'BANKER':     chips += Math.floor(g.bank/5); desc=`+${Math.floor(g.bank/5)}C bank`; break;
    case 'OVERCLOCK':  mult += 0.8; desc='+0.8M always'; break;
    case 'VALIDATOR':  if(vals.every(v=>v%2===0)){ mult += 2.5; desc='+2.5M all even'; } break;
    case 'PRIME':      if(vals.every(v=>[2,3,5,7,11,13,17,19,23].includes(v))){ chips += 10; mult += 1.5; desc='prime bonus'; } break;
    case 'HIGHROLLER': { const max=Math.max(...vals); chips+=max; desc=`+${max}C max`; } break;
    case 'ALLIN':      { const n=parseInt(handKey); if(handKey==='FOUR_OF_A_KIND'||handKey==='FIVE_OF_A_KIND'||handKey==='SIX_OF_A_KIND'||handKey==='SEVEN_OF_A_KIND'||handKey==='EIGHT_OF_A_KIND'||handKey==='NINE_OF_A_KIND'||handKey==='TEN_OF_A_KIND'||(!isNaN(n)&&n>=4)){ mult *= 2; desc='x2M quads+'; } } break;
    case 'HEDGER':     chips += vals.length * 1; desc=`+${vals.length}C per die`; break;
    case 'DEBUGGER':   if(g.rerolls === g.maxRerolls){ mult += 1; desc='+1M full rerolls'; } break;
    case 'SYMMETRY':   if(vals.every((v,i,a)=>i===0||a[i-1]<=v)){ chips+=6; desc='+6C sorted'; } break;
    case 'FIREWALL':   mult += Math.floor(g.jokers.length * 0.3); desc=`+${Math.floor(g.jokers.length*0.3)}M per joker`; break;
    case 'ENTROPY':    { const bonus=Math.floor(Math.random()*5); chips+=bonus; desc=`+${bonus}C chaos`; } break;
    case 'OVERKILL':   if(g.roundScore > g.target*0.5){ mult += 1.5; desc='+1.5M halfway'; } break;
    case 'MIRRORDICE': { const n=parseInt(handKey); const isNoak = ['FIVE_OF_A_KIND','SIX_OF_A_KIND','SEVEN_OF_A_KIND','EIGHT_OF_A_KIND','NINE_OF_A_KIND','TEN_OF_A_KIND'].includes(handKey)||(!isNaN(n)&&n>=5)||handKey==='FIVE_OF_A_KIND'; if(isNoak||new Set(vals).size===1){ mult += 4; desc='+4M all same!'; } } break;
    case 'LOWBALL':      { const lowCount = vals.filter(v=>v<=3).length; chips += lowCount; desc=lowCount?`+${lowCount}C low`:''; } break;
    case 'COUNTER':      { const unique = new Set(vals).size; mult += unique; desc=`+${unique}M unique`; } break;
    case 'ECHO':         { let counts={}; vals.forEach(v=>counts[v]=(counts[v]||0)+1); const pairs=Object.values(counts).filter(c=>c>=2).length; if(pairs>0){chips+=pairs*2;desc=`+${pairs*2}C pairs`;} } break;
    case 'SCAVENGER':    { const free = g.dice.filter(d=>d.v!==null&&!d.held&&!d.shattered).length; if(free>0){chips+=free*3;desc=`+${free*3}C free dice`;} } break;
    case 'ACCUMULATOR':  { const used = g.maxRerolls - g.rerolls; if(used>0){mult+=used*0.5;desc=`+${(used*0.5).toFixed(1)}M`;} } break;
    case 'TWINPEAK':     { if(vals.length>1){const spread=Math.max(...vals)-Math.min(...vals); if(spread<=1){mult+=3;desc='+3M tight';}} } break;
    case 'PALINDROME':   { const str=vals.join(''); if(str===str.split('').reverse().join('')&&vals.length>1){chips+=4;desc='+4C palindrome';} } break;
    case 'MATERIALIZER': { const mats=new Set(g.dice.filter(d=>d.v!==null).map(d=>d.material)).size; chips+=mats; desc=`+${mats}C materials`; } break;
    case 'THRESHOLD':    { if(chips>30){mult+=2;desc='+2M chips>30';} } break;
    case 'GODMODE':      { mult+=Math.floor(g.roundScore*0.1); desc=`+${Math.floor(g.roundScore*0.1)}M banked`; } break;
    case 'RECURSION':    { /* handled at score level */ } break;
  }
  return { chips, mult, desc };
}

function triggerJokerEvent(event, val) {
  g.jokers.forEach(j => {
    if(event === 'onRoll' && j.id === 'ENTROPY') {
      document.getElementById('gc').classList.add('glitching');
      setTimeout(() => document.getElementById('gc').classList.remove('glitching'), 200);
    }
  });
}

};

function addConsumable(id) {
  if(g.consumables.length >= 2) { notify('CONSUMABLE SLOTS FULL','bad'); return false; }
  g.consumables.push(id);
  updateCons();
  return true;
}

function useConsumable(id) {
  const def = CONSUMABLE_DEFS[id];
  if(!def) return;
  def.use();
  g.consumables = g.consumables.filter(c=>c!==id);
  updateCons();
}

function updateCons() {
  const slot = document.getElementById('cons-slot');
  const empty = document.getElementById('cons-empty');
  // Remove old cons cards
  slot.querySelectorAll('.cons-card').forEach(el=>el.remove());
  if(g.consumables.length === 0) {
    if(empty) empty.style.display = '';
  } else {
    if(empty) empty.style.display = 'none';
    g.consumables.forEach(id => {
      const def = CONSUMABLE_DEFS[id];
      if(!def) return;
      const card = document.createElement('span');
      card.className = 'cons-card';
      card.innerText = def.name;
      card.title = def.desc;
      card.onclick = () => useConsumable(id);
      slot.appendChild(card);
    });
  }
}

function enterShop() {
  if(!g.firstRollDone) { notify('ROLL FIRST','bad'); return; }

  // Score current dice
  const score = calculateScore();
  g.roundScore += score;
  g.totalScore += score;
  g.handsPlayed++;
  triggerJokerEvent('onScore', score);
  popScore('+' + score, document.getElementById('score-total'));
  shake(score > 500 ? 'xl' : score > 150 ? 'lg' : 'sm');
  updateScoreBar();

  // Check quota
  if(g.roundScore < g.target) {
    // Failed quota — game over
    setTimeout(() => gameOver(), 400);
    return;
  }

  // Earn reward based on score — $1 per 10 points scored, minimum 3, maximum 15
  const reward = Math.max(3, Math.min(15, Math.floor(score / 10)));
  g.bank += reward;
  notify(`+$${reward} FROM SCORE (${score} pts)`, 'gold');

  // Reset for shop
  g.shopRerollCost = 5;
  shopRerollCount = 0;
  currentShopTab = 'jokers';
  currentShopItems = {};

  document.getElementById('shop-bank-ui').innerText = g.bank;
  document.getElementById('screen-shop').classList.remove('hidden');
  document.querySelectorAll('.shop-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'jokers'));
  genShopForTab('jokers');
  renderShopContent();
}

function switchTab(tab) {
  currentShopTab = tab;
  document.querySelectorAll('.shop-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  genShopForTab(tab);
  renderShopContent();
}

function genShopForTab(tab) {
  if(!currentShopItems[tab]) {
    currentShopItems[tab] = generateShopItems(tab);
  }
}

function generateShopItems(tab) {
  const all = SHOP_CATALOG.filter(item => item.tab === tab);
  const shuffled = [...all].sort(()=>0.5-Math.random());
  const count = tab === 'jokers' ? 4 : tab === 'upgrades' ? 3 : tab === 'dice' ? 4 : 3;
  return shuffled.slice(0, count).map(item => ({ ...item, sold: false }));
}

function renderShopContent() {
  genShopForTab(currentShopTab);
  const items = currentShopItems[currentShopTab];
  const container = document.getElementById('shop-content');
  container.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'shop-section-title';
  const labels = { jokers:'PASSIVE JOKERS', consumables:'CONSUMABLE ITEMS', upgrades:'PERMANENT UPGRADES', dice:'DICE MODIFICATIONS' };
  title.innerText = labels[currentShopTab] || currentShopTab;
  container.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'shop-grid';

  items.forEach((item) => {
    const card = document.createElement('div');
    const rarityClass = `sc-${item.rarity}`;
    // Recalculate cant-afford live every render — never cache it
    const cantAfford = !item.sold && g.bank < item.cost;
    card.className = ['shop-card', rarityClass, item.sold ? 'sold' : '', cantAfford ? 'cant-afford' : ''].filter(Boolean).join(' ');

    card.innerHTML = `
      <span class="stype">${item.tab.toUpperCase()} · ${item.rarity.toUpperCase()}</span>
      <div class="sname">${item.name}</div>
      <div class="sdesc">${item.desc}</div>
      <div class="sprice">$${item.cost}</div>
      <div class="seffect">${item.effect || ''}</div>
    `;

    if(!item.sold) {
      card.onclick = () => {
        if(g.bank < item.cost) { notify('INSUFFICIENT CREDITS','bad'); return; }
        if(item.tab === 'jokers' && g.jokers.length >= 5) { notify('JOKER SLOTS FULL (5 MAX)','bad'); return; }
        if(item.tab === 'consumables' && !addConsumable(item.id)) return;

        g.bank -= item.cost;
        item.sold = true;
        item.f();
        document.getElementById('shop-bank-ui').innerText = g.bank;
        updateUI();
        renderShopContent(); // re-render recalculates all cant-afford states live
        notify(`PURCHASED: ${item.name}`, 'good');
        shake('sm');
      };
    }

    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function rerollShop() {
  const cost = g.shopRerollCost;
  if(g.bank < cost) { notify('INSUFFICIENT CREDITS','bad'); return; }
  g.bank -= cost;
  shopRerollCount++;
  g.shopRerollCost = 5 + shopRerollCount * 3;
  currentShopItems[currentShopTab] = generateShopItems(currentShopTab);
  document.getElementById('shop-bank-ui').innerText = g.bank;
  document.getElementById('reroll-cost-ui').innerText = g.shopRerollCost;
  updateUI();
  renderShopContent();
  shake('sm');
}

  { tab:'dice', rarity:'legendary', name:'OBSIDIAN DIE',      cost:18, desc:'Add an Obsidian D6. Grants +0.3 Mult per die in your entire pool.',          effect:'+0.3M/die · OBS',     f:()=>{ g.dice.push(makeDie([1,2,3,4,5,6],'obsidian')); initBoard(); notify('+1 OBSIDIAN DIE','good'); } },
  { tab:'dice', rarity:'uncommon',  name:'FORGE: →GOLD',      cost:12, desc:'Convert one Stone die into a Gold die.',                                     effect:'Stone→Gold',          f:()=>convertDie('stone','gold') },
  { tab:'dice', rarity:'uncommon',  name:'FORGE: →FIRE',      cost:12, desc:'Convert one Stone die into a Fire die.',                                     effect:'Stone→Fire',          f:()=>convertDie('stone','fire') },
  { tab:'dice', rarity:'uncommon',  name:'FORGE: →WOODEN',    cost:9,  desc:'Convert one Stone die into a Wooden die.',                                   effect:'Stone→Wooden',        f:()=>convertDie('stone','wooden') },
  { tab:'dice', rarity:'rare',      name:'FORGE: →CRYSTAL',   cost:16, desc:'Convert any die into a Crystal die.',                                        effect:'Any→Crystal',         f:()=>convertDie(null,'crystal') },
  { tab:'dice', rarity:'rare',      name:'FORGE: →STEEL',     cost:14, desc:'Convert any die into a Steel die.',                                          effect:'Any→Steel',           f:()=>convertDie(null,'steel') },
  { tab:'dice', rarity:'rare',      name:'FORGE: →BRONZE',    cost:13, desc:'Convert any die into a Bronze (wild) die.',                                  effect:'Any→Bronze',          f:()=>convertDie(null,'bronze') },
  { tab:'dice', rarity:'legendary', name:'FORGE: →OBSIDIAN',  cost:20, desc:'Convert any die into an Obsidian die.',                                      effect:'Any→Obsidian',        f:()=>convertDie(null,'obsidian') },
  { tab:'dice', rarity:'rare',      name:'SHATTER PROOF',     cost:12, desc:'Permanently protect all Glass dice — they no longer shatter on reroll.',     effect:'Glass immune to shatter',f:()=>{ g.glassShatterProof = true; notify('GLASS IS NOW SHATTERPROOF','info'); } },
];

function convertDie(fromMat, toMat) {
  const target = fromMat
    ? g.dice.find(d => d.material === fromMat)
    : g.dice.find(d => d.material !== toMat);
  if(!target) { notify(`NO ELIGIBLE DIE FOUND`, 'bad'); return; }
  target.material = toMat;
  if(toMat === 'wooden') target.woodenBonus = 0;
  initBoard();
  notify(`DIE CONVERTED → ${toMat.toUpperCase()}`, 'gold');
}

function addJoker(jokerDef) {
  if(g.jokers.length >= 5) return;
  if(g.jokers.find(j=>j.id===jokerDef.id)) { notify('JOKER ALREADY OWNED','bad'); return; }
  g.jokers.push(jokerDef);
  renderJokers();
}

function renderJokers() {
  const list = document.getElementById('joker-list');
  list.innerHTML = '';
  g.jokers.forEach(j => {
    const card = document.createElement('div');
    card.className = `joker-card joker-rarity-${j.rarity}`;
    card.innerHTML = `<span class="jname">${j.name}</span>${j.desc}`;
    list.appendChild(card);
  });
  document.getElementById('joker-count').innerText = g.jokers.length;
}

// ══════════════════════════════════════════════════════
//  ROUND PROGRESSION
// ══════════════════════════════════════════════════════
function startNextRound() {
  // Advance round / ante
  g.round++;
  if(g.round > 3) {
    g.ante++;
    g.round = 1;
    if(g.ante > MAX_ANTE) { winGame(); return; }
  }

  g.target = ANTE_TABLE[g.ante-1][0];
  g.roundScore = 0;
  g.rerolls = g.maxRerolls;
  g.firstRollDone = false;
  g.baseChips = 0;
  g.shopRerollCost = 5;
  currentShopItems = {};

  // Interest earnings
  if(g.hasInterestPrime) { const earn=Math.floor(g.bank/3); g.bank+=earn; if(earn>0) notify(`+$${earn} PRIME INTEREST`,'gold'); }
  else if(g.hasInterest) { const earn=Math.floor(g.bank/5); g.bank+=earn; if(earn>0) notify(`+$${earn} INTEREST`,'gold'); }

  // Starting chips bonus
  if(g.startingChips) g.baseChips += g.startingChips;

  // Wooden dice gain +1 to max face each round
  g.dice.forEach(d => {
    if(d.material === 'wooden') {
      d.woodenBonus = (d.woodenBonus || 0) + 1;
      d.sides = Array.from({length: 6 + d.woodenBonus}, (_,i) => i+1);
    }
  });

  g.glassRerolled = false;
  g.dice.forEach(d => { d.held=false; d.v=null; if(d.shattered) d.shattered=false; });

  document.getElementById('screen-shop').classList.add('hidden');
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('cash-btn').disabled = true;
  document.getElementById('rerolls-ui').innerText = g.rerolls;
  document.getElementById('hand-name').innerText = '–';
  document.getElementById('score-total').innerText = '0';
  document.getElementById('score-chips').innerHTML = '';
  document.getElementById('score-bar-inner').style.width = '0%';
  document.getElementById('score-progress-txt').innerText = `0 / ${g.target}`;

  buildAntePips();
  initBoard();
  updateUI();
}

function winGame() {
  document.getElementById('screen-win').classList.remove('hidden');
  document.getElementById('win-stats').innerHTML = `ALL ${MAX_ANTE} ANTES CLEARED<br>TOTAL SCORE: ${g.totalScore}<br>CREDITS REMAINING: $${g.bank}`;
  shake('xl');
}

// ══════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════
function updateUI() {
  document.getElementById('round-ui').innerText = g.round;
  document.getElementById('ante-ui').innerText = g.ante;
  document.getElementById('target-ui').innerText = g.target;
  document.getElementById('bank-ui').innerText = g.bank;
  document.getElementById('rerolls-ui').innerText = g.rerolls;
  if(document.getElementById('shop-bank-ui'))
    document.getElementById('shop-bank-ui').innerText = g.bank;
}

function updateScoreBar(current) {
  const pct = Math.min(100, Math.floor((g.roundScore + (current||0)) / g.target * 100));
  document.getElementById('score-bar-inner').style.width = pct + '%';
  document.getElementById('score-progress-txt').innerText = `${g.roundScore} / ${g.target}`;
}

function buildAntePips() {
  const container = document.getElementById('ante-pips');
  container.innerHTML = '';
  for(let i=1; i<=MAX_ANTE; i++) {
    const pip = document.createElement('div');
    pip.className = `ante-pip ${i < g.ante ? 'done' : ''}`;
    container.appendChild(pip);
  }
}

function shake(size) {
  const el = document.getElementById('gc');
  const cls = 'shake-' + size;
  el.classList.remove('shake-sm','shake-lg','shake-xl');
  void el.offsetWidth;
  el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}

function notify(msg, type='info') {
  const container = document.getElementById('notif');
  const el = document.createElement('div');
  el.className = `notif-msg notif-${type}`;
  el.innerText = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function popScore(text, anchor) {
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.innerText = text;
  pop.style.color = '#ffd700';
  pop.style.left = anchor.offsetLeft + anchor.offsetWidth/2 - 30 + 'px';
  pop.style.top = anchor.offsetTop - 10 + 'px';
  document.getElementById('gc').appendChild(pop);
  setTimeout(() => pop.remove(), 1050);
}

// ══════════════════════════════════════════════════════
//  AMBIENT GLITCH
// ══════════════════════════════════════════════════════
setInterval(() => {
  if(Math.random() > 0.91) {
    document.getElementById('gc').classList.add('glitching');
    setTimeout(() => document.getElementById('gc').classList.remove('glitching'), 220);
  }
}, 4000);

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
initGame();
</script>
